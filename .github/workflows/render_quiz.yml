name: Quiz Video Renderer

on:
  repository_dispatch:
    types: [render_quiz]

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          fc-cache -fv

      - name: Install Python deps
        run: pip install requests pillow

      - name: Prepare quiz data
        env:
          QUIZ_JSON: ${{ toJson(github.event.client_payload.quiz) }}
        run: |
          python3 -c "
          import os, json
          data = os.environ.get('QUIZ_JSON', '{}')
          with open('quiz_data.json', 'w', encoding='utf-8') as f:
              f.write(data)
          quiz = json.loads(data)
          print('Hook:', quiz.get('hookTitle',''))
          "

      - name: Generate TTS
        env:
          GCP_TTS_KEY: ${{ secrets.GCP_TTS_KEY }}
        run: |
          python3 << 'EOF'
          import json, requests, base64, os, sys
          with open('quiz_data.json','r',encoding='utf-8') as f:
              quiz = json.load(f)
          key = os.environ.get('GCP_TTS_KEY','')
          if not key:
              open('narration.mp3','wb').close()
              sys.exit(0)
          n = quiz.get('narration',{})
          text = ' '.join([n.get(k,'') for k in ['intro','question','countdown','answer','outro'] if n.get(k)])
          resp = requests.post(
              f'https://texttospeech.googleapis.com/v1/text:synthesize?key={key}',
              json={
                  'input':{'text':text},
                  'voice':{'languageCode':'ko-KR','name':'ko-KR-Wavenet-C','ssmlGender':'FEMALE'},
                  'audioConfig':{'audioEncoding':'MP3','speakingRate':1.0}
              }
          )
          if resp.ok and resp.json().get('audioContent'):
              data = base64.b64decode(resp.json()['audioContent'])
              open('narration.mp3','wb').write(data)
              print(f"TTS: {len(data)} bytes")
          else:
              open('narration.mp3','wb').close()
          EOF

      - name: Generate BGM
        run: |
          python3 -c "
          import json
          with open('quiz_data.json','r',encoding='utf-8') as f:
              quiz = json.load(f)
          hook = quiz.get('hookTitle','')
          bright = any(k in hook for k in ['심리','상식','넌센스','쉬움'])
          print('bright' if bright else 'mystery')
          " > mood.txt
          MOOD=$(cat mood.txt)
          if [ "$MOOD" = "bright" ]; then
            EXPR="0.05*sin(2*PI*261*t)+0.04*sin(2*PI*329*t)+0.03*sin(2*PI*392*t)"
          else
            EXPR="0.06*sin(2*PI*55*t)+0.04*sin(2*PI*82*t)+0.02*sin(2*PI*110*t)"
          fi
          ffmpeg -f lavfi -i "aevalsrc=${EXPR}:s=44100" \
            -af "afade=t=in:st=0:d=1,afade=t=out:st=28:d=2" \
            -t 30 -c:a libmp3lame -b:a 128k bgm.mp3 -y -loglevel error

      - name: Render frames
        run: |
          python3 << 'EOF'
          import json, os
          from PIL import Image, ImageDraw, ImageFont

          with open('quiz_data.json','r',encoding='utf-8') as f:
              quiz = json.load(f)

          W, H = 1080, 1920
          os.makedirs('frames', exist_ok=True)

          WHITE_BG  = (250, 250, 252)
          TEXT_LT   = (24, 24, 30)
          TEXT_GR   = (160, 160, 175)
          TEXT_WHT  = (238, 238, 248)
          DOT_OFF   = (200, 200, 212)
          DOT_ON    = (30, 30, 42)
          GREEN_ANS = (32, 178, 158)
          DARK_LBL  = (30, 30, 42)

          HEADER_H = 480
          BODY_Y   = HEADER_H
          BODY_H   = 1180
          FOOTER_Y = BODY_Y + BODY_H

          def fnt(size):
              for p in [
                  '/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc',
                  '/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc',
                  '/usr/share/fonts/noto-cjk/NotoSansCJKkr-Bold.otf',
              ]:
                  if os.path.exists(p):
                      try: return ImageFont.truetype(p, size)
                      except: pass
              return ImageFont.load_default()

          def tw(d, t, f):
              bb = d.textbbox((0,0),t,font=f); return bb[2]-bb[0]
          def th(d, t, f):
              bb = d.textbbox((0,0),t,font=f); return bb[3]-bb[1]

          def fit_font(d, text, max_w, sizes):
              for s in sizes:
                  f = fnt(s)
                  if tw(d, text, f) <= max_w: return f
              return fnt(sizes[-1])

          def get_lines(d, text, font, max_w):
              """텍스트를 줄바꿈하여 lines 리스트 반환"""
              words = text.split()
              lines, cur = [], ''
              for w in words:
                  t2 = (cur+' '+w).strip()
                  if tw(d, t2, font) > max_w and cur:
                      lines.append(cur); cur = w
                  else: cur = t2
              if cur: lines.append(cur)
              if len(lines)==1 and tw(d, lines[0], font) > max_w:
                  t = lines[0]; mid = len(t)//2
                  lines = [t[:mid], t[mid:]]
              return lines

          def draw_lines_centered(d, lines, y, font, color, lsp=24):
              """줄 목록을 중앙 정렬로 그리기, 최종 y 반환"""
              for line in lines:
                  ww = tw(d, line, font)
                  d.text(((W-ww)//2, y), line, font=font, fill=color)
                  y += th(d, line, font) + lsp
              return y

          def draw_label_circle(d, cx, cy, r, text, font, bg, fg):
              """원 안에 텍스트 정확히 중앙 정렬"""
              d.ellipse([cx-r, cy-r, cx+r, cy+r], fill=bg)
              bb = d.textbbox((0,0), text, font=font)
              tw_ = bb[2]-bb[0]
              th_ = bb[3]-bb[1]
              # textbbox의 offset 보정
              tx = cx - tw_//2 - bb[0]
              ty = cy - th_//2 - bb[1]
              d.text((tx, ty), text, font=font, fill=fg)

          def make_dark_gradient():
              img = Image.new('RGB', (W, HEADER_H))
              d = ImageDraw.Draw(img)
              top    = (14, 16, 28)
              bottom = (26, 28, 42)
              for y in range(HEADER_H):
                  t = y / HEADER_H
                  r = int(top[0]+(bottom[0]-top[0])*t)
                  g = int(top[1]+(bottom[1]-top[1])*t)
                  b = int(top[2]+(bottom[2]-top[2])*t)
                  d.rectangle([0,y,W,y+1], fill=(r,g,b))
              return img

          def make_frame(dot_filled=0, show_answer=False):
              img = Image.new('RGB', (W, H), WHITE_BG)
              d = ImageDraw.Draw(img)

              # ── 헤더 ──
              header = make_dark_gradient()
              img.paste(header, (0,0))
              d = ImageDraw.Draw(img)
              d.rectangle([0,0,W,5], fill=(91,127,255))

              f_tag = fnt(38)
              tag = '매일 30초 퀴즈!'
              d.text(((W-tw(d,tag,f_tag))//2, 52), tag, font=f_tag, fill=(130,140,175))
              d.rectangle([80,108,W-80,111], fill=(50,54,80))

              fixed_title = '정답을 맞춰보세요'
              f_title = fnt(74)
              title_area_h = HEADER_H - 130
              title_h = th(d, fixed_title, f_title)
              title_y = 130 + (title_area_h - title_h) // 2
              d.text(((W-tw(d,fixed_title,f_title))//2, title_y),
                     fixed_title, font=f_title, fill=TEXT_WHT)
              d.rectangle([0,HEADER_H-4,W,HEADER_H], fill=(40,44,68))

              # ── 본문 ──
              body_bottom = BODY_Y + BODY_H
              d.rectangle([0,BODY_Y,W,body_bottom], fill=WHITE_BG)

              if not show_answer:
                  # 문제 화면
                  q    = quiz.get('question','')
                  opts = quiz.get('options',[])

                  f_q = fit_font(d, q, 900, [68,60,54,48,42])
                  q_lines = get_lines(d, q, f_q, 900)
                  line_h  = th(d, q_lines[0], f_q) + 28
                  q_total_h = len(q_lines) * line_h

                  OPT_H   = 92
                  OPT_GAP = 8
                  opt_n   = len(opts[:4])
                  opt_total_h = opt_n * (OPT_H + OPT_GAP) if opts else 0
                  gap = 52 if opts else 0
                  content_h = q_total_h + gap + opt_total_h

                  start_y = BODY_Y + (BODY_H - content_h) // 2

                  # 문제 텍스트
                  qy = start_y
                  qy = draw_lines_centered(d, q_lines, qy, f_q, TEXT_LT, lsp=28)

                  # 선택지
                  if opts:
                      qy += gap
                      f_lbl = fnt(40)
                      f_opt = fnt(46)
                      lbls = ['A','B','C','D']
                      CIRCLE_R = 32
                      for i, opt in enumerate(opts[:4]):
                          bx1, by1 = 60, qy
                          bx2, by2 = W-60, qy+OPT_H
                          d.rounded_rectangle([bx1,by1,bx2,by2],
                                              radius=12, fill=(238,238,245))
                          # 원형 라벨 — 정확한 중앙 정렬
                          cx_c = bx1 + 16 + CIRCLE_R
                          cy_c = by1 + OPT_H//2
                          draw_label_circle(d, cx_c, cy_c, CIRCLE_R,
                                            lbls[i], f_lbl, DARK_LBL, WHITE_BG)
                          # 선택지 텍스트
                          text_x = bx1 + 16 + CIRCLE_R*2 + 18
                          text_y = by1 + (OPT_H - th(d, opt, f_opt))//2
                          d.text((text_x, text_y), opt, font=f_opt, fill=TEXT_LT)
                          qy += OPT_H + OPT_GAP

              else:
                  # 정답 화면 — 세로 중앙 정렬
                  ans = quiz.get('answer','')
                  exp = quiz.get('explanation','')

                  d.rectangle([0,BODY_Y,W,BODY_Y+6], fill=GREEN_ANS)

                  # 높이 사전 계산
                  f_albl = fnt(36)
                  f_ans  = fit_font(d, ans, 920, [96,84,72,60,50])
                  f_elbl = fnt(34)
                  f_exp  = fit_font(d, exp, 900, [50,44,38,34])

                  ans_lines = get_lines(d, ans, f_ans, 920)
                  exp_lines = get_lines(d, exp, f_exp, 900)

                  albl_h  = th(d, '정  답', f_albl) + 12
                  ans_h   = sum(th(d, l, f_ans)+22 for l in ans_lines)
                  sep_h   = 60   # 구분선 + 여백
                  elbl_h  = th(d, '해  설', f_elbl) + 12
                  exp_h   = sum(th(d, l, f_exp)+16 for l in exp_lines)

                  content_h = albl_h + ans_h + sep_h + elbl_h + 20 + exp_h
                  start_y = BODY_Y + 6 + (BODY_H - 6 - content_h) // 2

                  y = start_y

                  # 정답 라벨
                  albl_w = tw(d, '정  답', f_albl)
                  d.text(((W-albl_w)//2, y), '정  답', font=f_albl, fill=(140,150,165))
                  y += albl_h

                  # 정답 텍스트
                  y = draw_lines_centered(d, ans_lines, y, f_ans, GREEN_ANS, lsp=22)

                  # 구분선
                  y += 20
                  d.rectangle([80,y,W-80,y+3], fill=(210,215,225))
                  y += 20

                  # 해설 라벨
                  elbl_w = tw(d, '해  설', f_elbl)
                  d.text(((W-elbl_w)//2, y), '해  설', font=f_elbl, fill=(150,155,170))
                  y += elbl_h
                  d.rectangle([100,y,W-100,y+2], fill=(220,225,232))
                  y += 20

                  # 해설 텍스트
                  draw_lines_centered(d, exp_lines, y, f_exp, TEXT_LT, lsp=16)

              # ── 도트 카운터 ──
              DOT_N   = 10
              DOT_R   = 24
              DOT_GAP = 20
              total_w = DOT_N*(DOT_R*2)+(DOT_N-1)*DOT_GAP
              dot_x0  = (W-total_w)//2
              dot_area_h = H - body_bottom
              dot_y = body_bottom + (dot_area_h//2) - DOT_R - 28

              for i in range(DOT_N):
                  cx_dot = dot_x0 + i*(DOT_R*2+DOT_GAP) + DOT_R
                  color = DOT_ON if i < dot_filled else DOT_OFF
                  d.ellipse([cx_dot-DOT_R, dot_y,
                             cx_dot+DOT_R, dot_y+DOT_R*2], fill=color)

              # ── 푸터 ──
              f_ft = fnt(38)
              ft = '팔로우하고 매일 퀴즈 받아보세요' if show_answer else '기다리면 정답이 나와요!'
              ft_w = tw(d, ft, f_ft)
              d.text(((W-ft_w)//2, dot_y+DOT_R*2+22), ft,
                     font=f_ft, fill=(100,105,125))

              return img

          for i in range(11):
              make_frame(dot_filled=i, show_answer=False).save(f'frames/q_{i:02d}.png')
          print("Question frames done")

          make_frame(dot_filled=10, show_answer=True).save('frames/answer.png')
          print("Answer frame done")
          EOF

      - name: Compose video
        run: |
          set -e
          has_tts=false; [ -s narration.mp3 ] && has_tts=true
          has_bgm=false; [ -s bgm.mp3 ]       && has_bgm=true

          VF="scale=1080:1920:force_original_aspect_ratio=disable,setsar=1,fps=30"

          for i in $(seq 0 10); do
            fi=$(printf "%02d" $i)
            ffmpeg -loop 1 -i frames/q_${fi}.png -t 1 \
              -vf "${VF}" -pix_fmt yuv420p -c:v libx264 -preset fast -crf 16 \
              dot${fi}.mp4 -y -loglevel error
          done

          ffmpeg -loop 1 -i frames/answer.png -t 10 \
            -vf "${VF},fade=t=in:st=0:d=0.4" \
            -pix_fmt yuv420p -c:v libx264 -preset fast -crf 16 \
            ans.mp4 -y -loglevel error

          > cl.txt
          for i in $(seq 0 10); do
            echo "file 'dot$(printf "%02d" $i).mp4'" >> cl.txt
          done
          echo "file 'ans.mp4'" >> cl.txt

          ffmpeg -f concat -safe 0 -i cl.txt -c copy merged.mp4 -y -loglevel error
          DUR=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 merged.mp4)
          echo "Duration: ${DUR}s"

          if $has_tts && $has_bgm; then
            ffmpeg -i merged.mp4 -i narration.mp3 -stream_loop -1 -i bgm.mp3 \
              -filter_complex "[1:a]apad,atrim=duration=${DUR}[tts];[2:a]apad,atrim=duration=${DUR},volume=0.15[bgm];[tts][bgm]amix=inputs=2:duration=first:dropout_transition=2[a]" \
              -map 0:v -map "[a]" -c:v copy -c:a aac -b:a 192k quiz_video.mp4 -y -loglevel error
          elif $has_tts; then
            ffmpeg -i merged.mp4 -i narration.mp3 \
              -filter_complex "[1:a]apad,atrim=duration=${DUR}[a]" \
              -map 0:v -map "[a]" -c:v copy -c:a aac -b:a 192k quiz_video.mp4 -y -loglevel error
          elif $has_bgm; then
            ffmpeg -stream_loop -1 -i bgm.mp3 -i merged.mp4 \
              -filter_complex "[0:a]atrim=duration=${DUR},volume=0.3[a]" \
              -map 1:v -map "[a]" -c:v copy -c:a aac -b:a 192k quiz_video.mp4 -y -loglevel error
          else
            cp merged.mp4 quiz_video.mp4
          fi

          ls -lh quiz_video.mp4
          ffprobe -v quiet -show_entries format=duration:format=size -of default=noprint_wrappers=1 quiz_video.mp4

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: quiz-video-${{ github.run_number }}
          path: quiz_video.mp4
          retention-days: 7

      - name: Upload frames
        uses: actions/upload-artifact@v4
        with:
          name: quiz-frames-${{ github.run_number }}
          path: frames/
          retention-days: 3
